apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: event-processor

labels:
  - pairs:
      app.kubernetes.io/name: event-processor-api
    includeSelectors: true

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - keda-scaledobject.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: servicebus-secret
    envs:
      - .env
