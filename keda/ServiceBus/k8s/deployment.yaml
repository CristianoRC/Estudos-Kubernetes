apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-processor-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: event-processor-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: event-processor-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: event-processor-api
          image: event-processor-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: ConnectionStrings__ServiceBus
              valueFrom:
                secretKeyRef:
                  name: servicebus-secret
                  key: connection-string
            - name: ServiceBus__TopicName
              value: "order-events"
            - name: ServiceBus__SubscriptionName
              value: "order-processor"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
