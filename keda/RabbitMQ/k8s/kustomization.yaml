apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: event-processor

resources:
  - namespace.yaml
  - rabbitmq.yaml
  - deployment.yaml
  - keda-scaledobject.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: rabbitmq-secret
    envs:
      - .env
